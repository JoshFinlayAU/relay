run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - bodyclose
    - nolintlint

issues:
  exclude-rules:
    # Generated sqlc code.
    - path: internal/store/.*\.go
      linters: [unused, gosimple, staticcheck]
  max-issues-per-linter: 0
  max-same-issues: 0
