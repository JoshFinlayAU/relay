# Local dev stack: Postgres + relayd (API + WebUI) in one command.
#
#   docker compose up --build         # → http://localhost:8080
#
# The secret key / admin password below are throwaway DEV values baked into this
# file on purpose - it's a local stack. For real deployments, run the binary with
# a 0600 relay.toml via RELAY_CONFIG (see install.sh / relay.toml.example); never
# put production secrets in a committed compose file.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: relay
      POSTGRES_PASSWORD: relay_dev_pw
      POSTGRES_DB: relay
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relay"]
      interval: 3s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  relayd:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      RELAY_HOSTNAME: mail.local
      RELAY_HTTP_ADDR: ":8080"
      RELAY_DATABASE_URL: "postgres://relay:relay_dev_pw@postgres:5432/relay?sslmode=disable"
      RELAY_AUTO_MIGRATE: "true"
      # 32-byte base64 AES key (DEV ONLY).
      RELAY_SECRET_KEY: "3q2+7w8u9i0o1p2a3s4d5f6g7h8j9k0l1z2x3c4v5b6="
      RELAY_ADMIN_TOKENS: "relay_dev_token"
      # Bootstrap WebUI login (username/password). Change after first login.
      RELAY_ADMIN_USER: "admin"
      RELAY_ADMIN_PASSWORD: "relay-dev-password"
      # Lean local stack: API + WebUI only. Flip to "true" to exercise the SMTP
      # listeners / delivery workers (and map the ports below).
      RELAY_SUBMISSION_ENABLED: "false"
      RELAY_INBOUND_ENABLED: "false"
      RELAY_DELIVERY_ENABLED: "false"
    ports:
      - "8080:8080"
      # - "587:587"   # submission (STARTTLS)
      # - "465:465"   # submission (implicit TLS)
      # - "25:25"     # inbound / bounces

volumes:
  pgdata:
